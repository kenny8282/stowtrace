# StowTrace nginx config
# -----------------------
# Serves the web app on both HTTP and HTTPS. The HTTP server has special
# handling for captive-portal probe URLs so that when the Pi is in AP mode
# (broadcasting "StowTrace-Setup"), phones connecting to it automatically
# pop open a browser pointing to /wifi/.
#
# Why HTTP serves real content (not just a redirect to HTTPS):
#   - Phone captive-portal detectors hit known HTTP URLs and expect a
#     specific response. If they get our HTML page (not their expected
#     204 or specific success body), they conclude "this is a captive
#     portal" and auto-open a browser to that URL.
#   - If we redirect everything to HTTPS like we used to, phones hit the
#     self-signed cert error and the captive-portal flow stalls.
#   - So: probe URLs return a small HTML page that meta-refreshes to /wifi/.
#     /wifi/ is served over HTTP too so no cert prompt during setup. Once
#     the user is on home WiFi and visits stowtrace.local, they get the
#     HTTPS app as usual.

# ============================================================================
# HTTP server: captive-portal probes + setup flow
# ============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html;

    # WiFi setup page served over plain HTTP (no cert prompt during setup).
    location = /wifi { return 301 /wifi/; }
    location /wifi/ {
        alias /var/www/html/wifi/;
        try_files $uri $uri/ /wifi/index.html;
    }

    # Captive-portal probe URLs - Android/iOS/Windows/macOS hit one of these
    # on first WiFi connect. We respond with HTML that meta-refreshes to
    # /wifi/, which triggers the phone's captive-portal popup automatically.
    location = /generate_204              { default_type text/html; return 200 '<html><head><meta http-equiv="refresh" content="0;url=http://st.local/home"></head><body><a href="http://st.local/home">Open StowTrace</a></body></html>'; }
    location = /gen_204                   { default_type text/html; return 200 '<html><head><meta http-equiv="refresh" content="0;url=http://st.local/home"></head><body><a href="http://st.local/home">Open StowTrace</a></body></html>'; }
    location = /hotspot-detect.html       { default_type text/html; return 200 '<html><head><meta http-equiv="refresh" content="0;url=http://st.local/home"></head><body><a href="http://st.local/home">Open StowTrace</a></body></html>'; }
    location = /library/test/success.html { default_type text/html; return 200 '<html><head><meta http-equiv="refresh" content="0;url=http://st.local/home"></head><body><a href="http://st.local/home">Open StowTrace</a></body></html>'; }
    location = /ncsi.txt                  { default_type text/html; return 200 '<html><head><meta http-equiv="refresh" content="0;url=http://st.local/home"></head><body><a href="http://st.local/home">Open StowTrace</a></body></html>'; }
    location = /connecttest.txt           { default_type text/html; return 200 '<html><head><meta http-equiv="refresh" content="0;url=http://st.local/home"></head><body><a href="http://st.local/home">Open StowTrace</a></body></html>'; }
    location = /redirect                  { default_type text/html; return 200 '<html><head><meta http-equiv="refresh" content="0;url=http://st.local/home"></head><body><a href="http://st.local/home">Open StowTrace</a></body></html>'; }
    location = /success.txt               { default_type text/html; return 200 '<html><head><meta http-equiv="refresh" content="0;url=http://st.local/home"></head><body><a href="http://st.local/home">Open StowTrace</a></body></html>'; }

    # API proxy works over HTTP too so the wifi page can call /api/wifi/scan,
    # /api/wifi/connect, etc during the captive-portal flow without needing TLS.
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 5s;
        client_max_body_size 2G;
    }

    # Kiosk home: serve the landing page over HTTP so captive-portal clients
    # land directly on the app (no self-signed TLS prompt during the popup).
    location = /home {
        default_type text/html;
        add_header Cache-Control "no-cache, must-revalidate";
        alias /var/www/html/index.html;
    }
    location = /index.html { root /var/www/html; }

    # Serve the app's static assets over HTTP too so the kiosk home renders fully.
    location /inventory/ { alias /var/www/html/inventory/; try_files $uri $uri/ /inventory/index.html; }
    location /forge/     { alias /var/www/html/forge/;     try_files $uri $uri/ /forge/index.html; }

    # Everything else: redirect to HTTPS so the main app uses TLS. The /wifi/
    # and probe locations above are matched first so they're exempted.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# HTTPS server: full web app (home WiFi access)
# ============================================================================
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/stowtrace/stowtrace.crt;
    ssl_certificate_key /etc/ssl/stowtrace/stowtrace.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/html;

    # Home page (the landing with tiles)
    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # Label Forge under /forge/
    location = /forge { return 301 /forge/; }
    location /forge/ {
        alias /var/www/html/forge/;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /forge/index.html;
    }

    # Inventory app under /inventory/
    location = /inventory { return 301 /inventory/; }
    location /inventory/ {
        alias /var/www/html/inventory/;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /inventory/index.html;
    }

    # WiFi management page (also accessible over HTTPS for users on home WiFi)
    location = /wifi { return 301 /wifi/; }
    location /wifi/ {
        alias /var/www/html/wifi/;
        try_files $uri $uri/ /wifi/index.html;
    }

    # API proxy to Flask backend
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long timeouts for batch printing - the printer is slow (~5s per label)
        # and a 50-label batch can take several minutes.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 5s;
        client_max_body_size 2G;
    }
}
